<!DOCTYPE html>
<html>
    <head>
        <h1>calculator</h1>
        <h2 id="numfield">0</h2>
        <button style="width: 40px; height: 21px" id="digit1">1</button>
        <button style="width: 40px; height: 21px" id="digit2">2</button>
        <button style="width: 40px; height: 21px" id="digit3">3</button>
        <button style="width: 40px; height: 21px" id="operatorAddition">+</button><br>
        <button style="width: 40px; height: 21px" id="digit4">4</button>
        <button style="width: 40px; height: 21px" id="digit5">5</button>
        <button style="width: 40px; height: 21px" id="digit6">6</button>
        <button style="width: 40px; height: 21px" id="operatorSubtraction">-</button><br>
        <button style="width: 40px; height: 21px" id="digit7">7</button>
        <button style="width: 40px; height: 21px" id="digit8">8</button>
        <button style="width: 40px; height: 21px" id="digit9">9</button>

        <button style="width: 40px; height: 21px" id="root">√</button>

        <button style="width: 40px; height: 21px" id="equals">=</button><br>
        <button style="width: 40px; height: 21px" id="clear">CLR</button>
        <button style="width: 40px; height: 21px" id="operatorDivision">/</button>
        <button style="width: 40px; height: 21px" id="operatorParenOpen">(</button>
