<!DOCTYPE html>
<html>

<head>
    <title>chat</title>
    <link rel="stylesheet" href="styles3.css">
    <button id="exit">exit chat</button>
</head>

<body>
    <div class="container">
        <h1 class="logo">Chat 3</h1>
        <p>made by ben! <br>warning: if you get in trouble for using this it aint my fault</p>
        <form class="form" id="form" autocomplete="off">
            <input class="input" type="text" placeholder="Message" id="message" autocorrect="off">
            <input type="file" id="imageInput" accept="image/*">
            <button class="button">Send Message</button>
        </form>
        <div class="messageArea" id="messageArea"></div>
    </div>

    <script>
    const socket = new WebSocket('wss://websiteserver-ldkf.onrender.com');
    const form = document.getElementById('form');
    const username = localStorage.getItem('chatUser');
    const messageInput = document.getElementById('message');
    const messageArea = document.getElementById('messageArea');
    const imageInput = document.getElementById('imageInput');
    const exit = document.getElementById('exit')
    exit.addEventListener("click", () => {
        window.location.href = "index2.html";
    })

    // 1. Receive messages and display them
function addMessage(text) {
    try {
        const parsed = JSON.parse(text);
        if (parsed.type === 'image') {
            const p = document.createElement('p');
            p.textContent = parsed.user + ":";
            const img = document.createElement('img');
            img.src = parsed.data;
            img.style.maxWidth = "200px";
            messageArea.appendChild(p);
            messageArea.appendChild(img);
            messageArea.scrollTop = messageArea.scrollHeight;
            return;
        }
    } catch(e) {}
    const newMessage = document.createElement('p');
    newMessage.textContent = text;
    messageArea.appendChild(newMessage);
    messageArea.scrollTop = messageArea.scrollHeight;
}
    socket.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'history') {
        data.messages.forEach(msg => addMessage(msg));
    } else if (data.type === 'message') {
        addMessage(data.text);
    }
};

    // 2. Handle sending messages
    form.addEventListener('submit', (e) => {
    e.preventDefault();
    const file = imageInput.files[0];
    if (file) {    
        const reader = new FileReader();
        reader.onload = () => {
            socket.send(JSON.stringify({ type: 'image', user: username, data: reader.result }));
            imageInput.value = '';
        };         
        reader.readAsDataURL(file);
    } else if (messageInput.value && socket.readyState === WebSocket.OPEN) {
        socket.send(username + ": " + messageInput.value);
        messageInput.value = '';
    }              
});                
    form.addEventListener('submit', (e) => {
        e.preventDefault(); // Stop the page from refreshing
                   
        if (messageInput.value && socket.readyState === WebSocket.OPEN) {
            socket.send(username + ": " + messageInput.value);
            messageInput.value = ''; // Clear input
        }          
    });            
                   
    // Optional: Log connection status
    socket.onopen = () => console.log("Connected to server");
socket.onerror = (err) => console.error("Socket Error:", err);
    </script>
</body>

</html>
